<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Page not found — loading app...</title>
    <script>
      // SPA fallback for GitHub Pages:
      // Fetch the built index.html and replace the document so client-side routing works.
      (function () {
        // Try to fetch the built index.html (same folder)
        fetch('./index.html', { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) throw new Error('index.html not found');
            return res.text();
          })
          .then(function (html) {
            document.open();
            document.write(html);
            document.close();
            // Preserve the requested path so your SPA router sees the route
            history.replaceState({}, '', location.pathname + location.search + location.hash);
          })
          .catch(function () {
            // If fetch fails, redirect to repo root (update base if needed)
            location.replace('/Sequencecommerce/');
          });
      })();
    </script>
  </head>
  <body></body>
</html>

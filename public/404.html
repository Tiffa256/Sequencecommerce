<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Page not found — loading app...</title>
    <script>
      // SPA fallback for GitHub Pages: load the built index.html so client-side routing works.
      (function () {
        fetch('./index.html', { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) throw new Error('index.html not found');
            return res.text();
          })
          .then(function (html) {
            document.open();
            document.write(html);
            document.close();
            history.replaceState({}, '', location.pathname + location.search + location.hash);
          })
          .catch(function () {
            // If fetch fails, redirect to site root (adjust if you rename repo)
            location.replace('/Sequencecommerce/');
          });
      })();
    </script>
  </head>
  <body></body>
</html>

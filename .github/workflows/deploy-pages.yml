name: Build and deploy to GitHub Pages
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure SPA fallback (copy index.html -> 404.html)
        # copy index.html to 404.html so client-side routing works on GitHub Pages
        run: |
          if [ -f dist/index.html ]; then
            cp -f dist/index.html dist/404.html
            echo "Copied index.html -> dist/404.html"
          else
            echo "dist/index.html not found"
            ls -la dist || true
            exit 1
          fi

      - name: Upload artifact for GitHub Pages
        # This is the Pages-specific uploader (not the deprecated upload-artifact)
        uses: actions/upload-pages-artifact@v1
        with:
          path: './dist'

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

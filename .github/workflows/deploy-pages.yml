name: Build and deploy to GitHub Pages (gh-pages)
on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure SPA fallback (copy index.html -> 404.html)
        run: |
          if [ -f dist/index.html ]; then
            cp -f dist/index.html dist/404.html
            echo "Copied index.html -> dist/404.html"
          else
            echo "dist/index.html not found"
            ls -la dist || true
            exit 1
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # optional settings:
          # publish_branch: gh-pages
          # keep_files: false
